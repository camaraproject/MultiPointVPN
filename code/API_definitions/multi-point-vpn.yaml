openapi: 3.0.3
info:
  title: MultiPoint Virtual Private Network
  description: |
    ##### Before starting to use the API, the developer needs to know about the below specified details :

    * Multipoint VPN service endpoint The URL pointing to the RESTful resource of the Multipoint VPN API.

    * Authentication Security access keys such as OAuth 2.0 client credentials used by client applications to invoke the Multipoint VPN API.

    * Identifier for access point Customer Edge (CE) IPv4 address and/or IPv6 address of the Customer Edge Router.

    * Identifier for the endpoint cloud Provider Edge (PE) IPv4 and/or IPv6 address of the Cloud Provider Edge.

    * Identifier for the application server (AS) IPv4 and/or IPv6 address of the application server (cloud virtual machine).

    * App-Flow (between the application client and application server). The developer wants to have non public network delivery for the precise application data flow for the application users.

    * Duration Duration (in hours) for which the Multipoint VPN session (between CE and cloud PE) should be created. This parameter is optional. When not specified, a default session duration (e.g. 6 months) is applied. The user may request a termination before its expiration.

    * Physical Location Physical location of the Customer Edge Router.

    NOTE: The private physical link between CE and cloud PE is default deployed for one click calling, otherwise it is required to install the physical link, which is out of the scope of this API.

    # Available scopes

    - `multi-point-vpn:network:create` - Create a multipoint VPN network

    - `multi-point-vpn:network:read` - Retrieve multipoint VPN network details

    - `multi-point-vpn:network:update` - Update a multipoint VPN network

    - `multi-point-vpn:network:delete` - Delete a multipoint VPN network

    - `multi-point-vpn:assessment:assess` - Assess multipoint VPN connection feasibility

    <!-- CAMARA:MANDATORY:authorization-and-authentication:BEGIN -->
    # Authorization and authentication

    The "Camara Security and Interoperability Profile" provides details of how an API consumer requests an access token. Please refer to Identity and Consent Management (https://github.com/camaraproject/IdentityAndConsentManagement/) for the released version of the profile.

    The specific authorization flows to be used will be agreed upon during the onboarding process, happening between the API consumer and the API provider, taking into account the declared purpose for accessing the API, whilst also being subject to the prevailing legal framework dictated by local legislation.

    In cases where personal data is processed by the API and users can exercise their rights through mechanisms such as opt-in and/or opt-out, the use of three-legged access tokens is mandatory. This ensures that the API remains in compliance with privacy regulations, upholding the principles of transparency and user-centric privacy-by-design.
    <!-- CAMARA:MANDATORY:authorization-and-authentication:END -->

    <!-- CAMARA:MANDATORY:additional-error-responses:BEGIN -->
    # Additional CAMARA error responses

    The list of error codes in this API specification is not exhaustive. Therefore the API specification MAY not document some non-mandatory error statuses as indicated in `CAMARA API Design Guide`.

    Please refer to the `CAMARA_common.yaml` of the Commonalities Release associated to this API version for a complete list of error responses. The applicable Commonalities Release can be identified in the `API Readiness Checklist` document associated to this API version.

    As a specific rule, error `501 - NOT_IMPLEMENTED` can be only a possible error response if it is explicitly documented in the API.
    <!-- CAMARA:MANDATORY:additional-error-responses:END -->

    <!-- CAMARA:MANDATORY:request-body-strictness:BEGIN -->
    # Request body strictness

    This API rejects requests with JSON request bodies that contain properties not declared in this specification, at any nesting level. Unknown properties result in a `400 INVALID_ARGUMENT` response.
    <!-- CAMARA:MANDATORY:request-body-strictness:END -->
  version: wip
  license:
    name: Apache 2.0
    url: 'https://www.apache.org/licenses/LICENSE-2.0.html'
  x-camara-commonalities: 0.8.0
externalDocs:
  description: Product documentation at CAMARA
  url: 'https://github.com/camaraproject/MultiPointVPN'
servers:
  - url: '{apiRoot}/multi-point-vpn/vwip'
    variables:
      apiRoot:
        default: 'http://localhost:9091'
        description: API root, defined by the service provider, e.g. `api.example.com` or `api.example.com/somepath`
tags:
  - name: Network Assessment
    description: Operations to manage Multipoint VPN connection assessments
  - name: Network
    description: Operations to manage Multipoint VPN connection
paths:
  /networks:
    post:
      tags:
        - Network
      summary: To create a multipoint virtual private network
      description: Create a multipoint virtual private network
      operationId: createNetwork
      security:
        - openId:
            - multi-point-vpn:network:create
      parameters:
        - $ref: "#/components/parameters/x-correlator"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NetworkCreate"
            examples:
              SITE_TO_CLOUD_VPN_CREATE_CONNECTION:
                $ref: "#/components/examples/siteToCloudVPNCreateConnectionRequest"
      responses:
        "201":
          description: CreateVPNConnectionResponse
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
            Location:
              description: URL of the newly created network resource
              schema:
                type: string
                format: uri
                maxLength: 2048
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Network"
              examples:
                SITE_TO_CLOUD_VPN_CREATE_CONNECTION_RESPONSE:
                  $ref: "#/components/examples/siteToCloudVPNCreateConnectionResponse"
        "400":
          $ref: "#/components/responses/Generic400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/Generic403"
        "500":
          $ref: "#/components/responses/Generic500"
  /networks/{serviceId}:
    patch:
      tags:
        - Network
      summary: To update a multipoint virtual private network
      description: Update a multipoint virtual private network
      operationId: updateNetwork
      security:
        - openId:
            - multi-point-vpn:network:update
      parameters:
        - $ref: "#/components/parameters/x-correlator"
        - $ref: '#/components/parameters/serviceId'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/NetworkUpdate"
            examples:
              SITE_TO_CLOUD_VPN_UPDATE_CONNECTION:
                $ref: "#/components/examples/siteToCloudVPNUpdateConnectionRequest"
      responses:
        "200":
          description: UpdateVPNConnectionResponse
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Network"
              examples:
                SITE_TO_CLOUD_VPN_CREATE_CONNECTION_RESPONSE:
                  $ref: "#/components/examples/siteToCloudVPNCreateConnectionResponse"
        "400":
          $ref: "#/components/responses/Generic400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/Generic403"
        "404":
          $ref: "#/components/responses/Generic404"
        "500":
          $ref: "#/components/responses/Generic500"
    get:
      tags:
        - Network
      summary: retrieve multipoint virtual private network details
      description: Retrieve multipoint virtual private network details
      operationId: getNetwork
      security:
        - openId:
            - multi-point-vpn:network:read
      parameters:
        - $ref: "#/components/parameters/x-correlator"
        - $ref: '#/components/parameters/serviceId'
      responses:
        "200":
          description: getNetworkDetails
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Network"
              examples:
                SITE_TO_CLOUD_VPN_CREATE_CONNECTION_RESPONSE:
                  $ref: "#/components/examples/siteToCloudVPNCreateConnectionResponse"
        "400":
          $ref: "#/components/responses/Generic400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/Generic403"
        "404":
          $ref: "#/components/responses/Generic404"
        "500":
          $ref: "#/components/responses/Generic500"
    delete:
      tags:
        - Network
      summary: Delete multipoint virtual private network
      description: Delete multipoint virtual private network
      operationId: deleteNetwork
      security:
        - openId:
            - multi-point-vpn:network:delete
      parameters:
        - $ref: "#/components/parameters/x-correlator"
        - $ref: '#/components/parameters/serviceId'
      responses:
        "202":
          description: Network deletion request accepted. The deletion is processed asynchronously; the resource will be removed once complete.
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
        "400":
          $ref: "#/components/responses/Generic400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/Generic403"
        "404":
          $ref: "#/components/responses/Generic404"
        "500":
          $ref: "#/components/responses/Generic500"
  /assessment:
    post:
      tags:
        - Network Assessment
      summary: Assess Multipoint VPN connection feasibility
      description: Get the feasibility assessment for a Multipoint VPN connection
      operationId: assessConnectionFeasibility
      security:
        - openId:
            - multi-point-vpn:assessment:assess
      parameters:
        - $ref: "#/components/parameters/x-correlator"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessmentRequest"
            examples:
              SITE_TO_CLOUD_VPN_ASSESSMENT:
                $ref: "#/components/examples/siteToCloudVPNFeasibilityAssessmentRequest"
      responses:
        "200":
          description: Assessment result
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentResult"
              examples:
                SITE_TO_CLOUD_VPN_ASSESSMENT_RESULT:
                  $ref: "#/components/examples/siteToCloudVPNFeasibilityAssessmentResponse"
        "400":
          $ref: "#/components/responses/Generic400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/Generic403"
        "500":
          $ref: "#/components/responses/Generic500"
components:
  securitySchemes:
    openId:
      description: OpenIdConnect security scheme
      type: openIdConnect
      openIdConnectUrl: https://example.com/.well-known/openid-configuration
  headers:
    x-correlator:
      description: Correlation id for the different services
      required: false
      schema:
        $ref: "#/components/schemas/XCorrelator"
  parameters:
    x-correlator:
      name: x-correlator
      in: header
      description: Correlation id for the different services
      required: false
      schema:
        $ref: "#/components/schemas/XCorrelator"
    serviceId:
      name: serviceId
      required: true
      schema:
        type: string
        maxLength: 255
        pattern: '^[A-Za-z0-9\\-_.]{1,255}$'
      in: path
      description: Identifier of the Resource
  schemas:
    Amount:
      type: object
      description: An amount in a given unit
      properties:
        amount:
          type: number
          format: float
          default: 1
          description: Numeric value in a given unit
        currency:
          type: string
          maxLength: 3
          description: Currency code (ISO 4217 format, e.g., GBP, USD, EUR)
          pattern: '^[A-Z]{3}$'
    AssessmentRequest:
      description: Base schema for all areas
      type: object
      properties:
        isProtected:
          type: boolean
          description: Is Multipoint VPN protected
        connections:
          type: array
          description: list of connections details for customer and provider
          maxItems: 100
          items:
            $ref: '#/components/schemas/Connection'
        guaranteeBandwidth:
          type: integer
          format: int32
          description: Guarantee Bandwidth (Mbps)
          minimum: 1
          maximum: 1000000
        duration:
          $ref: '#/components/schemas/Duration'
    AssessmentResult:
      type: object
      description: Assessment Result
      properties:
        waitDays:
          type: integer
          format: int32
          description: the waiting-days until the vpn can be offered
          minimum: 1
          maximum: 3650
        sla:
          type: string
          description: Service Level Agreement between customer and provider
          enum:
            - A
            - AA
            - AAA
        rent:
          $ref: '#/components/schemas/Amount'
    Connection:
      description: Base Connection Entity structure
      type: object
      properties:
        id:
          type: string
          maxLength: 255
          pattern: '^[A-Za-z0-9\\-_.]{1,255}$'
          description: Unique identifier for the connection
        customerEdge:
          $ref: '#/components/schemas/EdgeConnection'
        providerEdge:
          $ref: '#/components/schemas/EdgeConnection'
    Duration:
      type: object
      description: Guarantee duration
      properties:
        value:
          type: number
          format: float
          default: 1
          description: Numeric value in a given unit
        unit:
          type: string
          maxLength: 20
          description: Time unit for the duration value
          enum:
            - minutes
            - hours
            - days
            - months
            - years
    ErrorInfo:
      description: Common schema for errors
      type: object
      required:
        - status
        - code
        - message
      properties:
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: HTTP status code returned along with this error response
        code:
          type: string
          maxLength: 255
          description: Code given to this error
        message:
          type: string
          maxLength: 2048
          description: Detailed error description
    EdgeConnection:
      description: Edge connection details
      type: object
      properties:
        type:
          type: string
          description: Multipoint VPN access point type
          enum:
            - site
            - cloud
        primaryIpAddress:
          allOf:
            - $ref: '#/components/schemas/IpAddress'
          description: Primary IP address of the edge connection
        secondaryIpAddress:
          allOf:
            - $ref: '#/components/schemas/IpAddress'
          description: Secondary (backup) IP address of the edge connection
        location:
          type: string
          maxLength: 2048
          format: uri
          description: connection location
    IpAddress:
      type: object
      description: Ip address details
      oneOf:
        - $ref: '#/components/schemas/Ipv4Address'
        - $ref: '#/components/schemas/Ipv6Address'
      discriminator:
        propertyName: addressType
        mapping:
          Ipv4Addr: '#/components/schemas/Ipv4Address'
          Ipv6Addr: '#/components/schemas/Ipv6Address'
    Ipv4Address:
      type: object
      description: Ipv4 address details
      required:
        - addressType
        - address
      properties:
        addressType:
          type: string
          enum:
            - Ipv4Addr
          description: address type
        address:
          type: string
          format: ipv4
          maxLength: 15
          description: ipv4 address
    Ipv6Address:
      type: object
      description: Ipv6 address details
      required:
        - addressType
        - address
      properties:
        addressType:
          type: string
          enum:
            - Ipv6Addr
          description: address type
        address:
          type: string
          format: ipv6
          maxLength: 45
          description: ipv6 address
    Network:
      description: Base Network Entity structure
      type: object
      properties:
        serviceId:
          type: string
          maxLength: 255
          pattern: '^[A-Za-z0-9\\-_.]{1,255}$'
          description: unique id for network service
        serviceName:
          type: string
          maxLength: 255
          pattern: '^[A-Za-z0-9\\-_.]{1,255}$'
          description: vpn service name
        isProtected:
          type: boolean
          description: Is Multipoint VPN protected
        connections:
          type: array
          description: list of connections details for customer and provider
          maxItems: 100
          items:
            $ref: '#/components/schemas/Connection'
        sla:
          type: string
          description: Service Level Agreement between customer and provider
          enum:
            - A
            - AA
            - AAA
        guaranteeBandwidth:
          type: integer
          format: int32
          description: Guarantee Bandwidth (Mbps)
          minimum: 1
          maximum: 1000000
        duration:
          $ref: '#/components/schemas/Duration'
        routeProtocol:
          type: string
          maxLength: 255
          pattern: '^[A-Za-z0-9\\-_.]{1,255}$'
          description: Routing Protocol used for this network
        resourceGroupId:
          type: string
          maxLength: 255
          pattern: '^[A-Za-z0-9\\-_.]{1,255}$'
          description: Resource Group Id
        cloudGatewayIp:
          type: string
          maxLength: 45
          description: Cloud Gateway IP
    NetworkCreate:
      description: Base Network Entity structure for creation
      type: object
      properties:
        serviceName:
          type: string
          maxLength: 255
          pattern: '^[A-Za-z0-9\\-_.]{1,255}$'
          description: vpn service name
        isProtected:
          type: boolean
          description: Is Multipoint VPN protected
        connections:
          type: array
          description: list of connections details for customer and provider
          maxItems: 100
          items:
            $ref: '#/components/schemas/Connection'
        guaranteeBandwidth:
          type: integer
          format: int32
          description: Guarantee Bandwidth (Mbps)
          minimum: 1
          maximum: 1000000
        sla:
          type: string
          description: Service Level Agreement between customer and provider
          enum:
            - A
            - AA
            - AAA
        duration:
          $ref: '#/components/schemas/Duration'
        routeProtocol:
          type: string
          maxLength: 255
          pattern: '^[A-Za-z0-9\\-_.]{1,255}$'
          description: Routing Protocol used for this network
    NetworkUpdate:
      description: Base Network Entity structure for update
      type: object
      properties:
        guaranteeBandwidth:
          type: integer
          format: int32
          description: Guarantee Bandwidth (Mbps)
          minimum: 1
          maximum: 1000000
        sla:
          type: string
          description: Service Level Agreement between customer and provider
          enum:
            - A
            - AA
            - AAA
    XCorrelator:
      type: string
      description: Correlation id for the different services
      maxLength: 256
      pattern: ^[a-zA-Z0-9-_:;.\/<>{}]{0,256}$
      example: "b4333c46-49c0-4f62-80d7-f0ef930f1c46"
  examples:
    siteToCloudVPNFeasibilityAssessmentRequest:
      summary: Assessment Sample 1
      description: Feasibility assessment sample
      value:
        isProtected: true
        connections:
          - customerEdge:
              type: site
              primaryIpAddress:
                addressType: Ipv4Addr
                address: 84.125.93.10
              secondaryIpAddress:
                addressType: Ipv4Addr
                address: 84.125.94.10
              location: string
            providerEdge:
              type: site
              primaryIpAddress:
                addressType: Ipv4Addr
                address: 84.125.93.10
              secondaryIpAddress:
                addressType: Ipv4Addr
                address: 84.125.94.10
        guaranteeBandwidth: 20
        duration:
          value: 6
          unit: days

    siteToCloudVPNFeasibilityAssessmentResponse:
      summary: Assessment Sample 1
      description: Feasibility assessment sample
      value:
        waitDays: 1
        sla: A
        rent:
          amount: 2000
          currency: GBP
    siteToCloudVPNCreateConnectionRequest:
      summary: Create Connection Sample 1
      description: Create Connection request sample
      value:
        isProtected: true
        connections:
          - customerEdge:
              type: site
              primaryIpAddress:
                addressType: Ipv4Addr
                address: 84.125.93.10
              secondaryIpAddress:
                addressType: Ipv4Addr
                address: 84.125.94.10
              location: string
            providerEdge:
              type: site
              primaryIpAddress:
                addressType: Ipv4Addr
                address: 84.125.93.10
              secondaryIpAddress:
                addressType: Ipv4Addr
                address: 84.125.94.10
        guaranteeBandwidth: 20
        duration:
          value: 6
          unit: days

    siteToCloudVPNCreateConnectionResponse:
      summary: Create Connection Sample 1
      description: Create Connection response sample
      value:
        serviceId: '111111'
        connections:
          - customerEdge:
              type: site
              primaryIpAddress:
                addressType: Ipv4Addr
                address: 84.125.93.10
              secondaryIpAddress:
                addressType: Ipv4Addr
                address: 84.125.94.10
              location: string
            providerEdge:
              type: site
              primaryIpAddress:
                addressType: Ipv4Addr
                address: 84.125.93.10
              secondaryIpAddress:
                addressType: Ipv4Addr
                address: 84.125.94.10
        resourceGroupId: '12121'
        cloudGatewayIp: 1.2.3.4
    siteToCloudVPNUpdateConnectionRequest:
      summary: Update Connection Sample 1
      description: Update Connection request sample
      value:
        guaranteeBandwidth: 10
        sla: A
  responses:
    Generic400:
      description: Bad Request
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 400
                  code:
                    enum:
                      - INVALID_ARGUMENT
                      - OUT_OF_RANGE
          examples:
            GENERIC_400_INVALID_ARGUMENT:
              description: Invalid Argument. Generic Syntax Exception
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: Client specified an invalid argument, request body or query param.
            GENERIC_400_OUT_OF_RANGE:
              description: Out of Range. Specific Syntax Exception used when a given field has a pre-defined range or a invalid filter criteria combination is requested
              value:
                status: 400
                code: OUT_OF_RANGE
                message: Client specified an invalid range.

    Generic401:
      description: Unauthorized
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 401
                  code:
                    enum:
                      - UNAUTHENTICATED
          examples:
            GENERIC_401_UNAUTHENTICATED:
              description: Request cannot be authenticated
              value:
                status: 401
                code: UNAUTHENTICATED
                message: Request not authenticated due to missing, invalid, or expired credentials.

    Generic403:
      description: Forbidden
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 403
                  code:
                    enum:
                      - PERMISSION_DENIED
          examples:
            GENERIC_403_PERMISSION_DENIED:
              description: Permission denied. OAuth2 token access does not have the required scope or when the user fails operational security
              value:
                status: 403
                code: PERMISSION_DENIED
                message: Client does not have sufficient permissions to perform this action.
    Generic404:
      description: Not Found
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 404
                  code:
                    enum:
                      - NOT_FOUND
          examples:
            GENERIC_404_NOT_FOUND:
              description: Resource not found
              value:
                status: 404
                code: NOT_FOUND
                message: The specified resource was not found.
    Generic500:
      description: Internal Server Error
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 500
                  code:
                    enum:
                      - INTERNAL
          examples:
            GENERIC_500_INTERNAL:
              description: Internal server error
              value:
                status: 500
                code: INTERNAL
                message: Internal server error while processing request.
